worker_processes auto;

events {
    # Increased to handle more simultaneous connections across your 3 replicas
    worker_connections 2048; 
}

http {
    # 1. Security: Hide NGINX version number
    server_tokens off;

    # Rate limiting zone: 10 req/s per IP
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    # Shared proxy headers for WebSockets
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # 2. Upstream Pool Setup
    upstream backend_servers {
        least_conn;
        
        # Docker DNS resolves 'backend' to your 3 replica IPs at startup.
        # max_fails and fail_timeout ensure NGINX temporarily stops routing 
        # to a replica if it fails to respond 3 times in 10 seconds.
        server backend:8000 max_fails=3 fail_timeout=10s;
        
        # Keeps 32 idle connections open to the backends to reduce latency
        keepalive 32; 
    }

    server {
        listen 80;
        server_name localhost;

        # 3. Security Headers (Protection against XSS, Clickjacking, etc.)
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header X-Request-ID $request_id always;
        add_header X-Upstream-Addr $upstream_addr always;

        # 4. Optimized Gzip Compression
        gzip on;
        gzip_comp_level 5; # Balance between CPU usage and file compression
        gzip_min_length 256;
        gzip_proxied any;
        gzip_types application/json text/plain application/xml text/css application/javascript;

        # Health check for the load balancer itself
        location /nginx-health {
            access_log off;
            add_header Content-Type application/json;
            return 200 '{"status":"ok","service":"nginx-lb"}';
        }

        # API routes → upstream backend pool
        location / {
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass http://backend_servers;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # 5. Connection and WebSocket optimizations
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            # Crucial for upstream keepalive to work properly
            proxy_set_header Connection ""; 

            # Timeouts (Dropped connect timeout to 5s to failover faster)
            proxy_connect_timeout 5s;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
        }
    }
}