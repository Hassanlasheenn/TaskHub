<section class="admin-wrapper p-2 p-sm-3 p-lg-4">
    <div class="admin-container d-flex flex-column flex-lg-row align-items-stretch gap-3 gap-lg-4">
        <div class="side-nav-wrapper d-none d-lg-block">
            <app-dashboard-side-nav
                [activeSection]="DashboardSections.ADMIN_PANEL"
                (sectionChange)="onSectionChange($event)"
            />
        </div>

        <div class="admin-content flex-grow-1 d-flex flex-column">
            <div class="admin-header d-flex justify-content-center align-items-center px-3 py-3 px-sm-4 py-sm-4 px-lg-5 py-lg-4">
                <h1>User Management</h1>
            </div>

            <div class="container-fluid px-0">
                <div class="row justify-content-center">
                    <div class="col-12">
                        <app-card [card]="{ title: 'All Users' }" class="admin-card">
                            <p class="section-description">Manage users, assign roles, and delete accounts.</p>
                            
                            <div class="users-table-wrapper">
                                <table class="users-table">
                                    <thead>
                                        <tr>
                                            <th>#</th>
                                            <th>ID</th>
                                            <th>Username</th>
                                            <th>Email</th>
                                            <th>Role</th>
                                            <th>Actions</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <tr *ngFor="let user of users; let i = index; trackBy: trackById" [class.current-user]="isCurrentUser(user.id)">
                                            <td>{{ i + 1 }}</td>
                                            <td>{{ user.id }}</td>
                                            <td>{{ user.username | titlecase }}</td>
                                            <td>{{ user.email }}</td>
                                            <td>
                                                <select 
                                                    class="role-select"
                                                    [value]="user.role"
                                                    [disabled]="isCurrentUser(user.id)"
                                                    (change)="onRoleChange(user.id, $any($event.target).value)"
                                                >
                                                    <option value="user">User</option>
                                                    <option value="admin">Admin</option>
                                                </select>
                                            </td>
                                            <td>
                                                <button 
                                                    class="btn-delete"
                                                    [disabled]="isCurrentUser(user.id)"
                                                    (click)="onDeleteUser(user.id)"
                                                    title="Delete user"
                                                >
                                                    <i class="bi bi-trash"></i>
                                                </button>
                                            </td>
                                        </tr>
                                        <tr *ngIf="users.length === 0">
                                            <td colspan="6" class="no-users">No users found</td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </app-card>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

<!-- Mobile Navigation Sidebar -->
<div class="d-lg-none">
    <app-sidebar
        [isOpen]="isNavSidebarOpen"
        [title]="'Taskrr'"
        [width]="'280px'"
        [position]="'left'"
        (closed)="onNavSidebarClose()"
    >
        <div class="mobile-nav-content">
            <app-dashboard-side-nav
                [activeSection]="DashboardSections.ADMIN_PANEL"
                (sectionChange)="onSectionChange($event); onNavSidebarClose()"
            />
        </div>
    </app-sidebar>
</div>
