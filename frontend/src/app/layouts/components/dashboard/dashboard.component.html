<section class="dashboard-wrapper">
    <div class="dashboard-container">
        <div class="dashboard-content d-flex flex-column">
            <div *ngIf="activeSection !== DashboardSections.CALENDAR && activeSection !== DashboardSections.COMPLETED && activeSection !== DashboardSections.USER_MANAGEMENT && activeSection !== DashboardSections.ADMIN_PANEL" class="dashboard-header d-flex flex-column flex-sm-row justify-content-between align-items-start align-items-sm-center mb-4 gap-3">
                <div class="greeting-container">
                    <span class="time-greeting">{{ timeBasedGreeting }},</span>
                    <h1 class="user-name">{{ (userData?.username | titlecase) }}</h1>
                </div>
                <div class="dashboard-actions d-flex align-items-center gap-2">
                    <div class="view-toggle d-flex" *ngIf="activeSection === DashboardSections.DASHBOARD">
                        <button 
                            type="button" 
                            class="view-toggle-btn"
                            [class.active]="viewMode === 'grid'"
                            (click)="setViewMode('grid')"
                            title="Column View"
                        >
                            <i class="bi bi-kanban"></i>
                        </button>
                        <button 
                            type="button" 
                            class="view-toggle-btn"
                            [class.active]="viewMode === 'table'"
                            (click)="setViewMode('table')"
                            title="Table View"
                        >
                            <i class="bi bi-table"></i>
                        </button>
                    </div>
                    <button type="button" class="add-task-btn" (click)="onAddTodo()" title="Add todo">
                        <i class="bi bi-plus-lg"></i>
                    </button>
                </div>
            </div>
            
            <app-calendar
                *ngIf="activeSection === DashboardSections.CALENDAR"
                [todos]="todos"
                (viewTodo)="onViewTodo($event)"
            />
            <app-admin-panel
                *ngIf="activeSection === DashboardSections.ADMIN_PANEL"
            />
            <app-admin
                *ngIf="activeSection === DashboardSections.USER_MANAGEMENT"
            />

            <div *ngIf="activeSection !== DashboardSections.CALENDAR && activeSection !== DashboardSections.USER_MANAGEMENT && activeSection !== DashboardSections.ADMIN_PANEL" class="todo-list-wrapper">
                <!-- Column Bars View -->
                <app-todo-columns
                    *ngIf="activeSection === DashboardSections.DASHBOARD && viewMode === 'grid'"
                    [todos]="filteredTodos"
                    [unassignedTodos]="unassignedTodos"
                    [showUnassigned]="isAdmin"
                    [todoViewPath]="LayoutPaths.TODO_VIEW"
                    (edit)="onEditTodo($event)"
                    (delete)="onDeleteTodo($event)"
                    (statusChange)="onTodoStatusChange($event)"
                    (unassign)="onTodoUnassign($event)"
                />

                <!-- Table View for Dashboard Section -->
                <div *ngIf="activeSection === DashboardSections.DASHBOARD && viewMode === 'table'" class="table-view-container">
                    <app-shared-table
                        [todos]="tableTodos"
                        [isAdmin]="isAdmin"
                        [totalItems]="tableTotal"
                        [currentPage]="tablePage"
                        [pageSize]="tablePageSize"
                        (update)="onTodoUpdate($event)"
                        (delete)="onDeleteTodo($event)"
                        (pageChange)="onTablePageChange($event)"
                        (pageSizeChange)="onTablePageSizeChange($event)"
                        (sortChange)="onTableSortChange($event)"
                        (filterChange)="onTableFilterChange($event)"
                    />
                </div>

                <!-- Legacy List View for Completed Section -->
                <div *ngIf="activeSection === DashboardSections.COMPLETED">
                    <app-todo-list 
                        [todos]="filteredTodos"
                        [totalCount]="filteredTodos.length"
                        [isCompletedSection]="true"
                        [showAddButton]="false"
                        [showIndex]="false"
                        [sectionTitle]="sectionTitle"
                        [showUsername]="true"
                        [username]="(userData?.username | titlecase) || null"
                        [showStatusFilter]="false"
                        [activeStatus]="activeStatus"
                        [activePriority]="activePriority"
                        (addTodo)="onAddTodo()"
                        (toggleTodo)="onToggleTodo($event)"
                        (deleteTodo)="onDeleteTodo($event)"
                        (editTodo)="onEditTodo($event)"
                        (viewTodo)="onViewTodo($event)"
                        (statusChange)="onStatusChange($event)"
                        (priorityChange)="onPriorityChange($event)"
                    />
                </div>
            </div>
        </div>
    </div>
</section>

<app-sidebar
    [isOpen]="isSidebarOpen"
    [title]="sidebarTitle"
    [width]="'450px'"
    (closed)="onSidebarClose()"
>
    <app-todo-form
        #todoForm
        [editingTodo]="editingTodo"
        (submitTodo)="onTodoSubmit($event)"
        (updateTodo)="onTodoUpdate($event)"
        (cancel)="onSidebarClose()"
    />
</app-sidebar>
