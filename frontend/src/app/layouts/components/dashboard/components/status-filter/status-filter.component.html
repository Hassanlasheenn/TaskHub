<div class="status-filter-container">
    <select
        id="status-select"
        class="status-select"
        [value]="activeStatus"
        (change)="onStatusChange($event)"
    >
        <option *ngFor="let status of statuses; trackBy: trackById" [value]="status.value">
            {{ status.label }}
        </option>
    </select>
</div>
