<div class="quick-filters-container">
    <div class="filters-wrapper">
        <button
            *ngFor="let filter of filters"
            type="button"
            class="filter-btn"
            [class.active]="activeFilter === filter.type"
            (click)="onFilterClick(filter.type)"
        >
            <i [class]="'bi ' + filter.icon"></i>
            <span>{{ filter.label }}</span>
        </button>
    </div>
</div>
