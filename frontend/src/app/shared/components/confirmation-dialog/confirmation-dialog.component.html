<div class="dialog-backdrop" *ngIf="isVisible" (click)="onBackdropClick($event)">
    <div class="dialog-container" (click)="$event.stopPropagation()">
        <div class="dialog-header">
            <h3 class="dialog-title">{{ title }}</h3>
            <button type="button" class="dialog-close" (click)="onCancel()" aria-label="Close">
                <i class="bi bi-x-lg"></i>
            </button>
        </div>
        <div class="dialog-body">
            <p class="dialog-message">{{ message }}</p>
        </div>
        <div class="dialog-footer">
            <button type="button" class="dialog-button dialog-button-cancel" (click)="onCancel()">
                {{ cancelText }}
            </button>
            <button type="button" class="dialog-button dialog-button-confirm" [class]="confirmButtonClass" (click)="onConfirm()">
                {{ confirmText }}
            </button>
        </div>
    </div>
</div>
